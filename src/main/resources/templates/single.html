<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pokémon • Find by id</title>
    <link rel="stylesheet" th:href="@{/pokemon.css}">
    <link rel="stylesheet" href="../static/pokemon.css">
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>Find Pokémon</h1>
            <div class="sub">Lookup by Pokédex number</div>
        </div>
        <nav>
            <a th:href="@{/pokemon}">Single</a>
            <a th:href="@{/pokemon/by-primary-type}">By type</a>
            <a th:href="@{/pokemon/averages}">Averages</a>
            <a th:href="@{/pokemon/counts}">Counts</a>
        </nav>
    </header>

    <div class="spacer"></div>

    <div th:if="${pokemon != null}" class="card">
        <div class="row">
            <span class="badge">#<span th:text="${pokemon.pokedexNumber}">25</span></span>
            <h2 th:text="${pokemon.name}">Pikachu</h2>
        </div>

        <div class="types">
            <span class="type" th:text="${pokemon.primaryType}">Electric</span>
            <span class="type"
                  th:if="${pokemon.secondaryType != null and !#strings.isEmpty(pokemon.secondaryType)}"
                  th:text="${pokemon.secondaryType}">—</span>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>HP</th><th>Atk</th><th>Def</th><th>SpA</th><th>SpD</th><th>Speed</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${pokemon.hp}">0</td>
                <td th:text="${pokemon.attack}">0</td>
                <td th:text="${pokemon.defence}">0</td>
                <td th:text="${pokemon.specialAttack}">0</td>
                <td th:text="${pokemon.specialDefence}">0</td>
                <td th:text="${pokemon.speed}">0</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
